<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" role="img" aria-labelledby="isoTitle isoDesc">
  <title id="isoTitle">ISO 9001:2015 — registered quality management system</title>
  <desc id="isoDesc">Capital Controls operates a quality management system registered to ISO 9001:2015. Official certificate and scope are available on request from the company.</desc>
  <defs>
    <filter id="isoShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Certificate-style lockup for light UI. Not the ISO organization’s trademarked logo. -->
  <g filter="url(#isoShadow)">
    <rect x="1" y="1" width="318" height="94" rx="8" fill="#ffffff" stroke="#002d62" stroke-width="1.5"/>
    <rect x="8" y="14" width="5" height="68" rx="2" fill="#00a651"/>
  </g>
  <circle cx="52" cy="48" r="22" fill="none" stroke="#002d62" stroke-width="2"/>
  <path d="M 41.5 48.5 L 47.5 55 L 63.5 39" fill="none" stroke="#00a651" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="84" y="38" fill="#002d62" font-family="Arial, Helvetica, system-ui, sans-serif" font-size="15" font-weight="700" letter-spacing="0.02em">ISO 9001:2015</text>
  <text x="84" y="56" fill="#3d4a5c" font-family="Arial, Helvetica, system-ui, sans-serif" font-size="9.5" font-weight="600" letter-spacing="0.14em">REGISTERED QUALITY MANAGEMENT</text>
  <text x="84" y="74" fill="#5c6b7f" font-family="Arial, Helvetica, system-ui, sans-serif" font-size="8.5" font-weight="600" letter-spacing="0.06em">Certificate and scope on request</text>
</svg>
