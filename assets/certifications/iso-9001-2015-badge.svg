<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 104" role="img" aria-labelledby="isoBadgeTitle isoBadgeDesc">
  <title id="isoBadgeTitle">Certified to ISO 9001:2015 — quality management systems</title>
  <desc id="isoBadgeDesc">Text-only certification lockup. Does not depict the ISO organization trademark. Request the official registration certificate and certification body mark from Capital Controls for procurement files.</desc>
  <defs>
    <filter id="soft" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <g filter="url(#soft)">
    <rect x="1.5" y="1.5" width="357" height="101" rx="12" fill="#ffffff" stroke="#002d62" stroke-width="2"/>
    <rect x="14" y="18" width="7" height="68" rx="2" fill="#00a651"/>
  </g>
  <text x="94" y="44" fill="#002d62" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" letter-spacing="0.01em">ISO 9001:2015</text>
  <text x="94" y="66" fill="#008a45" font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-weight="700" letter-spacing="0.16em">CERTIFIED — QUALITY MANAGEMENT</text>
  <text x="94" y="86" fill="#5c6b7f" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="600" letter-spacing="0.06em">Certificate &amp; certification body mark on request</text>
</svg>
