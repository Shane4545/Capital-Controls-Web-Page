<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" role="img" aria-label="Illustration: PLC rack, ladder editor, and SCADA overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a5f73"/>
      <stop offset="100%" stop-color="#3d4f63"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1400" height="780" fill="url(#bg)"/>
  <!-- Left: Control-style rack -->
  <g transform="translate(120,100)">
    <rect x="0" y="40" width="220" height="520" rx="2" fill="#6b7280" stroke="#475569" stroke-width="1"/>
    <text x="8" y="30" fill="#e2e8f0" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="0.12em">PLC RACK (GENERIC)</text>
    <rect x="14" y="440" width="192" height="100" fill="#4b5563" stroke="#374151"/>
    <text x="22" y="492" fill="#cbd5e1" font-family="IBM Plex Mono, monospace" font-size="10">POWER</text>
    <rect x="14" y="320" width="192" height="110" fill="#9ca3af" stroke="#6b7280"/>
    <rect x="22" y="332" width="40" height="28" fill="#1f2937"/>
    <text x="78" y="352" fill="#1f2937" font-family="IBM Plex Mono, monospace" font-size="10">CPU</text>
    <rect x="22" y="370" width="28" height="8" fill="#065f46"/><rect x="54" y="370" width="28" height="8" fill="#065f46"/>
    <circle cx="188" cy="362" r="4" fill="#22c55e"/>
    <rect x="14" y="250" width="192" height="60" fill="#9ca3af" stroke="#78716c"/><rect x="22" y="292" width="176" height="10" fill="#c9a227"/>
    <rect x="14" y="180" width="192" height="60" fill="#9ca3af" stroke="#78716c"/><rect x="22" y="222" width="176" height="10" fill="#c9a227"/>
    <rect x="14" y="110" width="192" height="60" fill="#9ca3af" stroke="#78716c"/><rect x="22" y="152" width="176" height="10" fill="#c9a227"/>
    <g stroke="#374151" stroke-width="1" fill="none"><line x1="10" y1="44" x2="10" y2="556"/><line x1="210" y1="44" x2="210" y2="556"/></g>
  </g>
  <!-- Center: ladder -->
  <g transform="translate(420,100)">
    <rect x="0" y="0" width="480" height="510" fill="url(#glass)" stroke="#475569" stroke-width="1"/>
    <line x1="36" y1="56" x2="36" y2="454" stroke="#64748b" stroke-width="3"/>
    <line x1="444" y1="56" x2="444" y2="454" stroke="#64748b" stroke-width="3"/>
    <text x="44" y="36" fill="#e2e8f0" font-family="IBM Plex Mono, monospace" font-size="13" font-weight="600">ROUTINE PMP_BOOST_INTERLOCK</text>
    <text x="44" y="54" fill="#94a3b8" font-family="IBM Plex Mono, monospace" font-size="11">Studio 5000 / Logix style — illustration</text>
    <line x1="36" y1="120" x2="444" y2="120" stroke="#4ade80" stroke-width="2.5" filter="url(#glow)"/>
    <text x="52" y="108" fill="#94a3b8" font-family="IBM Plex Mono, monospace" font-size="10">0  Permissive chain</text>
    <line x1="36" y1="200" x2="320" y2="200" stroke="#64748b" stroke-width="2"/>
    <line x1="36" y1="280" x2="320" y2="280" stroke="#64748b" stroke-width="2"/>
    <line x1="36" y1="360" x2="320" y2="360" stroke="#64748b" stroke-width="2"/>
  </g>
  <!-- Right: SCADA -->
  <g transform="translate(960,110)">
    <rect x="0" y="0" width="320" height="500" rx="3" fill="#374151" stroke="#1f2937" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="48" fill="#0f172a"/>
    <text x="14" y="32" fill="#f1f5f9" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="14" font-weight="600">SCADA OVERVIEW</text>
    <rect x="16" y="64" width="120" height="160" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <rect x="22" y="120" width="108" height="98" fill="#38bdf8" opacity="0.35"/>
    <text x="22" y="88" fill="#e2e8f0" font-family="IBM Plex Mono, monospace" font-size="10">WET WELL</text>
    <circle cx="200" cy="130" r="32" fill="none" stroke="#22c55e" stroke-width="3"/>
    <text x="192" y="136" fill="#86efac" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="700">M</text>
    <text x="174" y="180" fill="#cbd5e1" font-family="IBM Plex Mono, monospace" font-size="10">P-101A</text>
    <rect x="200" y="260" width="100" height="72" fill="#334155"/>
    <text x="210" y="288" fill="#94a3b8" font-family="IBM Plex Mono, monospace" font-size="9">DISCH PSI</text>
    <rect x="210" y="298" width="80" height="10" fill="#22c55e"/>
    <text x="8" y="492" fill="#94a3b8" font-family="IBM Plex Mono, monospace" font-size="9">Representative HMI — not live</text>
  </g>
  <path d="M340 380 Q620 340 860 360 T980 320" fill="none" stroke="#64748b" stroke-width="1.5" opacity="0.5" stroke-dasharray="5 6"/>
  <path d="M900 380 Q930 360 960 340" fill="none" stroke="#64748b" stroke-width="1.2" opacity="0.45"/>
</svg>
