<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" role="img" aria-label="Control rack, ladder logic, and wet well process  static composite">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06080d"/>
      <stop offset="55%" stop-color="#0a0f18"/>
      <stop offset="100%" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2332" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0d1219" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1400" height="780" fill="url(#bg)"/>
  <!-- Left: rack silhouette -->
  <g transform="translate(120,100)">
    <rect x="0" y="40" width="220" height="520" rx="2" fill="#141a24" stroke="#2a3544" stroke-width="1"/>
    <rect x="14" y="60" width="192" height="40" fill="#1c2430" stroke="#2f3c4d" stroke-width="0.5"/>
    <text x="22" y="86" fill="#64748b" font-family="IBM Plex Mono, monospace" font-size="11">POWER</text>
    <rect x="14" y="110" width="192" height="48" fill="#1a222e" stroke="#00a651" stroke-width="0.8" stroke-opacity="0.35"/>
    <text x="22" y="140" fill="#94a3b8" font-family="IBM Plex Mono, monospace" font-size="11">CPU</text>
    <rect x="18" y="122" width="90" height="6" fill="#00a651" opacity="0.35"/>
    <rect x="14" y="168" width="192" height="36" fill="#1c2430"/>
    <rect x="14" y="210" width="192" height="36" fill="#1c2430"/>
    <rect x="14" y="252" width="192" height="36" fill="#1c2430"/>
    <rect x="14" y="294" width="192" height="36" fill="#1c2430"/>
    <g fill="#00a651" opacity="0.85">
      <circle cx="188" cy="128" r="3"/><circle cx="32" cy="186" r="2.5"/><circle cx="188" cy="228" r="2.5"/>
    </g>
    <g stroke="#3d4f63" stroke-width="1" fill="none"><line x1="8" y1="44" x2="8" y2="556"/><line x1="212" y1="44" x2="212" y2="556"/></g>
    <text x="8" y="30" fill="#475569" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="0.15em">FIELD I/O RACK</text>
  </g>
  <!-- Center: ladder panel -->
  <g transform="translate(480,120)">
    <rect x="0" y="0" width="440" height="460" fill="url(#glass)" stroke="#334155" stroke-width="1"/>
    <line x1="32" y1="48" x2="32" y2="412" stroke="#4b5563" stroke-width="3"/>
    <line x1="408" y1="48" x2="408" y2="412" stroke="#4b5563" stroke-width="3"/>
    <line x1="32" y1="100" x2="408" y2="100" stroke="#5b6578" stroke-width="2"/>
    <line x1="32" y1="160" x2="408" y2="160" stroke="#5b6578" stroke-width="2"/>
    <line x1="32" y1="220" x2="408" y2="220" stroke="#00a651" stroke-width="3" filter="url(#glow)"/>
    <rect x="36" y="206" width="368" height="28" fill="#00a651" opacity="0.12"/>
    <line x1="32" y1="280" x2="408" y2="280" stroke="#5b6578" stroke-width="2"/>
    <line x1="32" y1="340" x2="408" y2="340" stroke="#5b6578" stroke-width="2"/>
    <text x="40" y="36" fill="#94a3b8" font-family="IBM Plex Mono, monospace" font-size="12">LADDER  RUNG ACTIVE</text>
  </g>
  <!-- Right: wet well -->
  <g transform="translate(1000,160)">
    <rect x="0" y="120" width="280" height="280" fill="#121820" stroke="#2a3544" stroke-width="1"/>
    <rect x="12" y="132" width="256" height="180" fill="#0f1724"/>
    <path d="M12 380 L268 380 L268 400 L12 400 Z" fill="#1e3a4a" opacity="0.85"/>
    <ellipse cx="140" cy="312" rx="118" ry="14" fill="#1a4a5c" opacity="0.5"/>
    <rect x="48" y="80" width="44" height="100" fill="#252d38" stroke="#3d4a5c"/>
    <rect x="188" y="80" width="44" height="100" fill="#252d38" stroke="#3d4a5c"/>
    <ellipse cx="70" cy="88" rx="16" ry="6" fill="none" stroke="#00a651" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="210" cy="88" rx="16" ry="6" fill="none" stroke="#00a651" stroke-width="1.5" opacity="0.8"/>
    <line x1="140" y1="20" x2="140" y2="300" stroke="#00a651" stroke-width="1.5" opacity="0.45"/>
    <rect x="120" y="8" width="40" height="20" fill="#1c2430" stroke="#475569"/>
    <text x="8" y="468" fill="#64748b" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="0.12em">WET WELL ť LEVEL ť PUMPS</text>
  </g>
  <!-- Signal paths -->
  <path d="M340 360 Q520 300 700 320 T1040 340" fill="none" stroke="#00a651" stroke-width="1.5" opacity="0.35" stroke-dasharray="6 8"/>
  <path d="M920 360 Q1010 280 1100 260" fill="none" stroke="#00a651" stroke-width="1.5" opacity="0.3"/>
</svg>
