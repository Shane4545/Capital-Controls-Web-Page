# Publishes the static site to GitHub Pages.
#
# ONE-TIME (required or "Setup Pages" fails with HttpError Not Found):
#   Repo → Settings → Pages → Build and deployment → Source → GitHub Actions
#   (Do NOT leave Source on "Deploy from a branch" for this workflow.)
# Then: Actions → failed run → Re-run failed jobs.
#
# Note: Push to main still lands your files on GitHub; only the Pages publish step needs the setting above.
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
