# Publishes the static site by pushing to the `gh-pages` branch (no configure-pages API).
#
# ONE-TIME in GitHub: Settings → Pages → Build and deployment
#   Source: Deploy from a branch
#   Branch: gh-pages   Folder: / (root)
# Save, then wait a minute for the site to build. The first push from this workflow creates `gh-pages`.
#
# If you previously set Source to "GitHub Actions", switch it to "Deploy from a branch" as above.
#
# IMPORTANT: Do not use "Re-run failed jobs" on old runs from before this workflow dropped
# configure-pages — that replays the OLD yaml. Use "Run workflow" or push to main instead.
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,tools'
