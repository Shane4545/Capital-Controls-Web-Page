# Actions → Configure GitHub Pages source → Run workflow (no secrets).

name: Configure GitHub Pages source

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  set-main-root:
    runs-on: ubuntu-latest
    steps:
      - name: Set Pages to main / (root)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          API="https://api.github.com/repos/${REPO}/pages"
          HDR=( -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" )
          BODY='{"build_type":"legacy","source":{"branch":"main","path":"/"}}'

          put_pages() {
            curl -sS -o /tmp/put.json -w "%{http_code}" -X PUT "${HDR[@]}" "$API" -d "$BODY"
          }

          post_pages() {
            curl -sS -o /tmp/post.json -w "%{http_code}" -X POST "${HDR[@]}" "$API" -d "$BODY"
          }

          code=$(curl -sS -o /tmp/pages.json -w "%{http_code}" "${HDR[@]}" "$API")
          echo "GET $API => HTTP $code"
          [ -s /tmp/pages.json ] && { echo "GET body:"; cat /tmp/pages.json; echo; }

          ok_put() {
            case "$1" in
              204|200) echo "PUT OK (HTTP $1)."; return 0 ;;
              *) echo "PUT failed (HTTP $1):"; cat /tmp/put.json 2>/dev/null || true; echo; return 1 ;;
            esac
          }

          if [ "$code" = "404" ]; then
            echo "POST create..."
            p=$(post_pages)
            echo "POST => HTTP $p"; cat /tmp/post.json || true; echo
            if [ "$p" = "201" ]; then
              echo "SUCCESS: Pages site created from main /."
              exit 0
            fi
            echo "POST did not return 201 — trying PUT..."
            p=$(put_pages)
            echo "PUT => HTTP $p"; cat /tmp/put.json || true; echo
            ok_put "$p"
            echo "SUCCESS: Pages source updated to main /."
            exit 0

          elif [ "$code" = "200" ]; then
            echo "Pages record exists — PUT update..."
            p=$(put_pages)
            echo "PUT => HTTP $p"; cat /tmp/put.json || true; echo
            if ok_put "$p"; then
              echo "SUCCESS: Pages source set to main /."
              exit 0
            fi
            echo
            echo "GitHub refused this change via API (common if Source is GitHub Actions)."
            echo "Open in browser: https://github.com/${REPO}/settings/pages"
            echo "Set Source to: Deploy from branch → main → / (root)."
            exit 1

          elif [ "$code" = "403" ]; then
            echo "GET 403 — token cannot access Pages API for this repo."
            exit 1

          else
            echo "Unexpected GET HTTP $code"; exit 1
          fi
